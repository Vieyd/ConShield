services:
  postgres:
    image: postgres:16-alpine
    container_name: conshield-postgres
    environment:
      POSTGRES_DB: ${CONSHIELD_POSTGRES_DB:-conshield}
      POSTGRES_USER: ${CONSHIELD_POSTGRES_USER:-conshield}
      POSTGRES_PASSWORD: ${CONSHIELD_POSTGRES_PASSWORD:?Set CONSHIELD_POSTGRES_PASSWORD before starting PostgreSQL}
    ports:
      - "${CONSHIELD_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.3-management-alpine
    container_name: conshield-rabbitmq
    profiles: ["messaging"]
    environment:
      RABBITMQ_DEFAULT_USER: ${CONSHIELD_RABBITMQ_USER:?Set CONSHIELD_RABBITMQ_USER before starting RabbitMQ}
      RABBITMQ_DEFAULT_PASS: ${CONSHIELD_RABBITMQ_PASSWORD:?Set CONSHIELD_RABBITMQ_PASSWORD before starting RabbitMQ}
      RABBITMQ_DEFAULT_VHOST: /conshield
    ports:
      - "${CONSHIELD_RABBITMQ_AMQP_PORT:-5672}:5672"
      - "127.0.0.1:${CONSHIELD_RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo:
    image: mongo:8.0
    container_name: conshield-mongo
    profiles: ["projection"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${CONSHIELD_MONGO_ROOT_USERNAME:?Set CONSHIELD_MONGO_ROOT_USERNAME before starting MongoDB}
      MONGO_INITDB_ROOT_PASSWORD: ${CONSHIELD_MONGO_ROOT_PASSWORD:?Set CONSHIELD_MONGO_ROOT_PASSWORD before starting MongoDB}
      MONGO_INITDB_DATABASE: conshield_events
      CONSHIELD_MONGO_APP_USERNAME: ${CONSHIELD_MONGO_APP_USERNAME:?Set CONSHIELD_MONGO_APP_USERNAME before starting MongoDB}
      CONSHIELD_MONGO_APP_PASSWORD: ${CONSHIELD_MONGO_APP_PASSWORD:?Set CONSHIELD_MONGO_APP_PASSWORD before starting MongoDB}
    ports:
      - "127.0.0.1:${CONSHIELD_MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  rabbitmq_data:
  mongo_data:
