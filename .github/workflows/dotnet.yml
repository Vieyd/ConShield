name: .NET

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dotnet-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      CONSHIELD_TEST_POSTGRES_CONNECTION: Host=localhost;Port=5432;Database=conshield_tests;Username=postgres
      CONSHIELD_TEST_RABBITMQ_HOST: localhost
      CONSHIELD_TEST_RABBITMQ_PORT: 5672
      CONSHIELD_TEST_RABBITMQ_VHOST: /conshield
      CONSHIELD_TEST_RABBITMQ_USERNAME: conshield_ci
      CONSHIELD_TEST_RABBITMQ_PASSWORD: conshield_ci_password_not_for_production

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: conshield_tests
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d conshield_tests"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:4.3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: conshield_ci
          RABBITMQ_DEFAULT_PASS: conshield_ci_password_not_for_production
          RABBITMQ_DEFAULT_VHOST: /conshield
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore ConShield.sln

      - name: Build
        run: dotnet build ConShield.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ConShield.sln --configuration Release --no-build
