name: .NET

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: conshield_tests
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d conshield_tests"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      CONSHIELD_TEST_POSTGRES_CONNECTION: Host=localhost;Port=5432;Database=conshield_tests;Username=postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore ConShield.sln

      - name: Build
        run: dotnet build ConShield.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ConShield.sln --configuration Release --no-build
